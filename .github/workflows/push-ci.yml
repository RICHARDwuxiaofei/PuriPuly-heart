name: Push CI

on:
  push:
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: push-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Black (check)
        run: black --check src tests

      - name: Pytest with coverage >= 80% (exclude integration)
        run: |
          python -m pytest \
            --ignore=tests/integration \
            --cov=src/puripuly_heart \
            --cov-report=term-missing \
            --cov-fail-under=80

  coderabbit-review:
    name: CodeRabbit CLI review (push)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: ${{ secrets.CODERABBIT_API_KEY != '' && github.event.before != '0000000000000000000000000000000000000000' }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CodeRabbit CLI
        run: curl -fsSL https://cli.coderabbit.ai/install.sh | sh

      - name: Run CodeRabbit review
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
          BASE_COMMIT: ${{ github.event.before }}
        run: |
          "$HOME/.local/bin/coderabbit" review \
            --plain \
            --base-commit "$BASE_COMMIT" \
            --api-key "$CODERABBIT_API_KEY"
