name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  verify-version:
    name: Verify tag and version sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.sync.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and project versions
        id: sync
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          root = Path(".")
          tag_name = os.environ["TAG_NAME"]
          tag_version = tag_name[1:] if tag_name.startswith("v") else tag_name

          if not tag_version:
              print(f"Invalid tag: {tag_name}")
              sys.exit(1)

          pyproject_path = root / "pyproject.toml"
          init_path = root / "src" / "puripuly_heart" / "__init__.py"
          installer_path = root / "installer.iss"

          pyproject = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))
          pyproject_version = pyproject["project"]["version"]

          init_match = re.search(
              r'^__version__\s*=\s*"([^"]+)"',
              init_path.read_text(encoding="utf-8"),
              re.MULTILINE,
          )
          if not init_match:
              print("Could not find __version__ in src/puripuly_heart/__init__.py")
              sys.exit(1)
          init_version = init_match.group(1)

          installer_match = re.search(
              r'^#define\s+MyAppVersion\s+"([^"]+)"',
              installer_path.read_text(encoding="utf-8"),
              re.MULTILINE,
          )
          if not installer_match:
              print("Could not find MyAppVersion in installer.iss")
              sys.exit(1)
          installer_version = installer_match.group(1)

          versions = {
              "tag": tag_version,
              "pyproject.toml": pyproject_version,
              "src/puripuly_heart/__init__.py": init_version,
              "installer.iss": installer_version,
          }

          unique_versions = set(versions.values())
          if len(unique_versions) != 1:
              print("Version mismatch detected:")
              for source, value in versions.items():
                  print(f"  {source}: {value}")
              sys.exit(1)

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"version={tag_version}\n")

          print(f"Version sync OK: {tag_version}")
          PY

  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: verify-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build executable
        run: python -m PyInstaller build.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $isccPath = Join-Path "${env:ProgramFiles(x86)}" "Inno Setup 6\ISCC.exe"
          & $isccPath installer.iss

      - name: Generate SHA256
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          $installer = "installer_output/PuriPulyHeart-Setup-$env:VERSION.exe"
          $hash = (Get-FileHash -Path $installer -Algorithm SHA256).Hash
          "$hash  PuriPulyHeart-Setup-$env:VERSION.exe" | Out-File -FilePath "$installer.sha256" -Encoding ascii

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            installer_output/PuriPulyHeart-Setup-${{ needs.verify-version.outputs.version }}.exe
            installer_output/PuriPulyHeart-Setup-${{ needs.verify-version.outputs.version }}.exe.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-version
      - build-installer
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PuriPuly Heart v${{ needs.verify-version.outputs.version }}
          draft: true
          body_path: .github/release-template.md
          files: |
            release-artifacts/PuriPulyHeart-Setup-${{ needs.verify-version.outputs.version }}.exe
            release-artifacts/PuriPulyHeart-Setup-${{ needs.verify-version.outputs.version }}.exe.sha256
